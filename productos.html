<script src="vendors/jquery.smartCart/js/jquery.smartCart.min.js"></script>

<script>

    function catalogo() {
        var listaProductos = '';
        for (let i = 0; i < productos.length; i++) {
            listaProductos += 
            '<div class="col-md-6 col-12">' +
                '<div class="sc-product-item card h-100 p-3 shadow-sm">' +
                    '<img class="img-fluid mb-3" data-name="product_image" src="assets/img/productos/' + productos[i].img + '" alt="'+ productos[i].nombre +'">' +
                    '<h4 data-name="product_name">'+ productos[i].nombre +'</h4>' +
                    '<p data-name="product_desc" class="text-muted">'+ productos[i].desc +'</p>' +
                    '<p class="fw-bold">$' + productos[i].precio.toLocaleString('es-AR') + '</p>' +
                    '<input name="product_id" value="'+ productos[i].id + '" type="hidden">' +
                    '<input name="product_price" value="'+ productos[i].precio + '" type="hidden">' +
                    '<button class="sc-add-to-cart btn btn-success mt-auto">Añadir al carrito</button>' +
                '</div>' +
            '</div>';
        }
        return listaProductos;
    }

    let listadoCatalogo = catalogo();

    $(document).ready(function () {

        $('#grillaProductos').html(listadoCatalogo); 

        $('#smartcart').smartCart({

            lang: {

                cartTitle: "Mi Carrito:",

                checkout: 'Pagar',

                clear: 'Borrar',

                subtotal: 'Subtotal:',

                cartRemove: '×',

                cartEmpty: 'Nada todavía...<br />¡Adquirí un libro!'

            }
        });
    });



</script>
